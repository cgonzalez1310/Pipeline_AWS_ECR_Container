name: App Build and Push DEV

on:
  push:
    branches:
      - develop
    paths:
      - 'app/**'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: gemini-client

jobs:
  build_and_push:
    runs-on: cicd-ikigii
    if: contains(github.event.head_commit.message, 'deploy-dev')

    outputs:
      image_uri: ${{ steps.export-image.outputs.image_uri }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_CAPP_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_CAPP_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: ./app
        shell: bash
        run: |
          TAG="gemini_${GITHUB_SHA::7}"
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV
          docker build -t "${ECR_REPOSITORY}:${TAG}" .

      - name: Tag and push Docker image to ECR
        id: export-image
        shell: bash
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker tag "${ECR_REPOSITORY}:${IMAGE_TAG}" "${IMAGE_URI}"
          docker push "${IMAGE_URI}"

          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Persist image URI to SSM
        shell: bash
        run: |
          aws ssm put-parameter \
            --name "/appian/gemini/dev/image_uri" \
            --type "String" \
            --value "${IMAGE_URI}" \
            --overwrite

      - name: Docker cleanup
        if: always()
        shell: bash
        run: |
          docker image prune -af
          docker builder prune -af

      - name: Clean workspace
        if: always()
        shell: bash
        run: |
          rm -rf "${{ github.workspace }}"/*